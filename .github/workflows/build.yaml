name: Build Executables

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller requests pillow

      - name: Build executable
        shell: bash
        run: |
          SEP=":"
          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
          fi

          pyinstaller \
            --onefile \
            --noconsole \
            --add-data "krosshair.png${SEP}." \
            --add-data "default_preferences.json${SEP}." \
            --add-data "assets${SEP}assets" \
            --hidden-import=PIL._tkinter_finder \
            --hidden-import=PIL.ImageTk \
            --collect-all PIL \
            krosshair.py

      - name: Prepare release folder
        shell: bash
        run: |
          mkdir -p release

          if [ "$RUNNER_OS" = "Windows" ]; then
            mv dist/krosshair.exe release/krosshair-windows.exe
          else
            mv dist/krosshair release/krosshair-linux
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: krosshair-${{ runner.os }}
          path: release/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/krosshair-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}